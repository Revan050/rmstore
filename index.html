  .search-input {

    box-shadow: 0 8px 32px rgba(31,38,135,0.08);

  .search-input:focus { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 35%, transparent); }

  .filters { margin-top: 16px; }

  .chip {

</style>

const state = {
  query: '',
  models: [],
  countries: [],
  route: { page: 'home', productId: null },
  showReviewForm: false,
  reviewDraft: { name: '', rating: 5, text: '' },
};

function formatPrice(price) {
  return new Intl.NumberFormat('ru-RU').format(price) + ' ₽';
}
function pluralize(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return 'товар';
  if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'товара';
  return 'товаров';
}
function pluralizeReviews(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return 'отзыв';
  if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'отзыва';
  return 'отзывов';
}
function matchesQuery(p, q) {
  if (!q.trim()) return true;
  const hay = [p.model, p.storage, p.color, String(p.price)].join(' ').toLowerCase();
  return hay.includes(q.toLowerCase().trim());
}
function filterProducts() {
  return CATALOG.products.filter(p => {
    if (!matchesQuery(p, state.query)) return false;
    if (state.models.length && !state.models.includes(p.model)) return false;
    if (state.countries.length && !state.countries.includes(p.country)) return false;
    return true;
  });
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function cardHtml(p, i) {
  const country = COUNTRY_META[p.country];
  const isPro = p.model.includes('Pro');
  const glyph = isAirPods(p.model) ? airpodsGlyph('card-glyph') : deviceGlyph(p.colorHex, isPro, 'card-glyph');
  const badge = p.status ? `<span class="badge ${STATUS_META[p.status].cls}">${STATUS_META[p.status].label}</span>` : '';
  return `
    <button class="card" data-product-id="${p.id}" style="animation-delay:${Math.min(i * 0.03, 0.3)}s">
      <div class="card-glyph">${glyph}</div>
      <div class="card-body">
        <div class="card-title-row"><h3>${escapeHtml(p.model)}</h3><span class="card-storage">${escapeHtml(p.storage)}</span></div>
        <p class="card-sub">${escapeHtml(p.color)} · ${country.flag} ${country.label}</p>
        <div class="card-price">${formatPrice(p.price)}</div>
        ${badge}
      </div>
      <div class="card-arrow"><svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M1 1L7 7L1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </button>
  `;
}

function starsHtml(rating, size) {
  size = size || 13;
  let out = '';
  for (let i = 1; i <= 5; i++) {
    const filled = i <= rating;
    out += `<svg width="${size}" height="${size}" viewBox="0 0 24 24" class="${filled ? 'star-filled' : 'star-empty'}" stroke-width="1.5" stroke="currentColor">
      <path d="M12 2 15.09 8.26 22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>`;
  }
  return out;
}

    ? `<a class="review-name" href="https://t.me/${escapeHtml(r.username)}" data-profile-link="${escapeHtml(r.username)}">
         ${escapeHtml(r.name)}
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
       </a>`
    : `<span class="review-name">${escapeHtml(r.name)}</span>`;
  const date = new Date(r.date).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });

  return `
    <div class="review-card" style="animation-delay:${Math.min(i * 0.04, 0.3)}s">
      <div class="review-head">
        <div class="review-avatar">${initial}</div>
        <div class="review-name-col">
          ${nameHtml}
          <div class="review-date">${date}</div>
        </div>
        <div class="review-stars">${starsHtml(r.rating)}</div>
      </div>
      <p class="review-text">${escapeHtml(r.text)}</p>
    </div>
  `;
}

function renderReviews() {
  const avg = REVIEWS.length
    ? (REVIEWS.reduce((sum, r) => sum + r.rating, 0) / REVIEWS.length).toFixed(1)
    : null;

  const list = REVIEWS.length === 0
    ? `<div class="empty">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
         <p>Пока нет отзывов. Будьте первым!</p>
       </div>`
    : REVIEWS.slice().reverse().map((r, i) => reviewCardHtml(r, i)).join('');

  const formOrButton = state.showReviewForm ? reviewFormHtml() : `
    <button class="leave-review-btn" id="open-review-form">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 15.09 8.26 22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Оставить отзыв
    </button>
  `;

  return `
    <div class="reviews-page">
      <button class="back-link" id="back-btn-top">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Назад
      </button>

      <div class="reviews-title-row">
        <h1>Отзывы клиентов</h1>
        ${avg ? `<span class="reviews-avg">${starsHtml(Math.round(Number(avg)), 15)} ${avg} · ${REVIEWS.length} ${pluralizeReviews(REVIEWS.length)}</span>` : ''}
      </div>

      ${list}
      ${formOrButton}
    </div>
    <div class="toast" id="toast"></div>
  `;
}

function reviewFormHtml() {
  const tgUser = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;
  const prefillName = state.reviewDraft.name || (tgUser ? [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') : '');

  return `
    <div class="review-form">
      <label>Ваше имя</label>
      <input type="text" id="review-name" placeholder="Как вас представить" value="${escapeHtml(prefillName)}" />

      <label>Оценка</label>
      <div class="star-picker" id="star-picker">
        ${[1,2,3,4,5].map(n => `
          <button type="button" class="star-pick-btn" data-star="${n}">
            <svg viewBox="0 0 24 24" class="${n <= state.reviewDraft.rating ? 'star-filled' : 'star-empty'}" stroke-width="1.5" stroke="currentColor">
              <path d="M12 2 15.09 8.26 22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </button>
        `).join('')}
      </div>

      <label>Ваш отзыв</label>
      <textarea id="review-text" placeholder="Расскажите, как прошёл заказ">${escapeHtml(state.reviewDraft.text)}</textarea>

      <div class="review-form-actions">
        <button class="btn-cancel" id="cancel-review">Отмена</button>
        <button class="btn-submit" id="submit-review">Отправить</button>
      </div>
    </div>
  `;
}

function showToast(message) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = message;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function submitReview() {
  const nameInput = document.getElementById('review-name');
  const textInput = document.getElementById('review-text');
  const name = nameInput.value.trim();
  const text = textInput.value.trim();
  const rating = state.reviewDraft.rating;

  if (!name || !text) {
    showToast('Заполните имя и текст отзыва');
    return;
  }

  const tgUser = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;
  const usernameLine = tgUser && tgUser.username ? ('@' + tgUser.username) : 'без username';
  const stars = '⭐'.repeat(rating);

  const message = [
    '📝 Новый отзыв на RmStore',
    'Имя: ' + name,
    'Telegram: ' + usernameLine,
    'Оценка: ' + stars + ' (' + rating + '/5)',
    'Текст: ' + text,
  ].join('\n');

  // Копируем в буфер обмена, чтобы владелец мог получить готовый текст —
  // без бэкенда это самый надёжный способ передать отзыв.
  const finish = () => {
    haptic('success');
    showToast('Скопировано! Вставьте текст в чат и отправьте');
    state.showReviewForm = false;
    state.reviewDraft = { name: '', rating: 5, text: '' };
    setTimeout(() => openOrderChat(), 400);
    render();
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(message).then(finish).catch(finish);
  } else {
    finish();
  }
}

// ====================== РОУТИНГ И РЕНДЕР ======================
function render() {
  const app = document.getElementById('app');
  if (state.route.page === 'detail') {
    app.innerHTML = renderDetail(state.route.productId);
    if (tg) tg.BackButton.show();
  } else if (state.route.page === 'reviews') {
    app.innerHTML = renderReviews();
    if (tg) tg.BackButton.show();
  } else {
    app.innerHTML = renderHome();
    if (tg) tg.BackButton.hide();
  }
  attachEvents();
}

function goHome() {
  haptic('tap');
  state.route = { page: 'home', productId: null };
  state.showReviewForm = false;
  location.hash = '';
  render();
}
function goDetail(id) {
  haptic('select');
  state.route = { page: 'detail', productId: id };
  location.hash = 'product/' + id;
  render();
}
function goReviews() {
  haptic('select');
  state.route = { page: 'reviews', productId: null };
  location.hash = 'reviews';
  render();
}

function attachEvents() {
  if (state.route.page === 'home') {
    const input = document.getElementById('search-input');
    input.addEventListener('input', (e) => {
      state.query = e.target.value;
      render();
      // сохраняем фокус и позицию курсора после ре-рендера
      const el = document.getElementById('search-input');
      el.focus();
      el.setSelectionRange(el.value.length, el.value.length);
    });
    const clearBtn = document.getElementById('search-clear');
    if (clearBtn) clearBtn.addEventListener('click', () => { state.query = ''; render(); });

    document.querySelectorAll('[data-toggle-model]').forEach(btn => {
      btn.addEventListener('click', () => {
        haptic('tap');
        const m = btn.getAttribute('data-toggle-model');
        state.models = state.models.includes(m) ? state.models.filter(x => x !== m) : [...state.models, m];
        render();
      });
    });
    document.querySelectorAll('[data-toggle-country]').forEach(btn => {
      btn.addEventListener('click', () => {
        haptic('tap');
        const c = btn.getAttribute('data-toggle-country');
        state.countries = state.countries.includes(c) ? state.countries.filter(x => x !== c) : [...state.countries, c];
        render();
      });
    });
    const resetBtn = document.getElementById('reset-filters');
    if (resetBtn) resetBtn.addEventListener('click', () => { state.models = []; state.countries = []; render(); });

    document.querySelectorAll('[data-product-id]').forEach(card => {
      card.addEventListener('click', () => goDetail(card.getAttribute('data-product-id')));
    });

    const reviewsNavBtn = document.getElementById('go-reviews');
    if (reviewsNavBtn) reviewsNavBtn.addEventListener('click', goReviews);
  } else if (state.route.page === 'reviews') {
    const backTop = document.getElementById('back-btn-top');
    if (backTop) backTop.addEventListener('click', goHome);

    document.querySelectorAll('[data-profile-link]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        haptic('tap');
        const username = link.getAttribute('data-profile-link');
        if (tg) tg.openTelegramLink('https://t.me/' + username);
        else window.open('https://t.me/' + username, '_blank', 'noopener,noreferrer');
      });
    });

    const openFormBtn = document.getElementById('open-review-form');
    if (openFormBtn) openFormBtn.addEventListener('click', () => {
      haptic('tap');
      state.showReviewForm = true;
      render();
    });

    if (state.showReviewForm) {
      const nameInput = document.getElementById('review-name');
      const textInput = document.getElementById('review-text');
      nameInput.addEventListener('input', (e) => { state.reviewDraft.name = e.target.value; });
      textInput.addEventListener('input', (e) => { state.reviewDraft.text = e.target.value; });

      document.querySelectorAll('[data-star]').forEach(btn => {
        btn.addEventListener('click', () => {
          haptic('tap');
          state.reviewDraft.rating = Number(btn.getAttribute('data-star'));
          state.reviewDraft.name = document.getElementById('review-name').value;
          state.reviewDraft.text = document.getElementById('review-text').value;
          render();
        });
      });

      const cancelBtn = document.getElementById('cancel-review');
      if (cancelBtn) cancelBtn.addEventListener('click', () => {
        haptic('tap');
        state.showReviewForm = false;
        render();
      });

      const submitBtn = document.getElementById('submit-review');
      if (submitBtn) submitBtn.addEventListener('click', submitReview);
    }
  } else {
    const backTop = document.getElementById('back-btn-top');
    const backBottom = document.getElementById('back-btn-bottom');
    if (backTop) backTop.addEventListener('click', goHome);
    if (backBottom) backBottom.addEventListener('click', goHome);
    const orderBtn = document.getElementById('order-btn');
    if (orderBtn) orderBtn.addEventListener('click', openOrderChat);
  }
}

if (tg) {
  tg.BackButton.onClick(goHome);
}

// восстановление маршрута из хэша (на случай обновления страницы на карточке товара)
function routeFromHash() {
  const hash = location.hash.replace('#', '');
  if (hash.startsWith('product/')) {
    state.route = { page: 'detail', productId: hash.replace('product/', '') };
  } else if (hash === 'reviews') {
    state.route = { page: 'reviews', productId: null };
  } else {
    state.route = { page: 'home', productId: null };
  }
}
window.addEventListener('hashchange', () => { routeFromHash(); render(); });

routeFromHash();
render();
</script>
