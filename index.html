    --surface: rgba(255,255,255,0.6);
    --border: rgba(0,0,0,0.06);
    --accent: #0071E3;
    --success: #2FA84F;
    --warn: #E8A100;
    --danger: #E0402A;
    --chip-bg: rgba(255,255,255,0.6);

  html.dark {
    --bg: #000000;
    --ink: #F5F5F7;
    --muted: #98989D;
    --surface: rgba(28,28,30,0.6);
    --border: rgba(255,255,255,0.1);
    --chip-bg: rgba(255,255,255,0.06);

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {

    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;

  button, input { font-family: inherit; }
  #app { min-height: 100%; padding-bottom: 40px; }

  .header {
    position: sticky; top: 0; z-index: 20;
    padding: 24px 20px 16px;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    background: color-mix(in srgb, var(--bg) 70%, transparent);
    border-bottom: 1px solid var(--border);
    animation: fadeDown .5s ease-out both;

  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 36px; height: 36px; border-radius: 16px;
    background: linear-gradient(135deg, #2b2b2e, #57575c);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);

  html.dark .brand-icon { background: linear-gradient(135deg, #fff, #d0d0d5); }
  .brand-icon svg { width: 18px; height: 18px; }
  .brand h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
  .subtitle { margin: 4px 0 0; font-size: 15px; color: var(--muted); }
  .updated { margin: 2px 0 0; font-size: 12px; color: var(--muted); opacity: .7; }

  .content { padding: 16px 20px 0; }

  .search-wrap { position: relative; }
  .search-wrap svg.icon-search {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%; border: 1px solid var(--border);
    background: var(--surface); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 16px; padding: 12px 36px 12px 40px;
    font-size: 15px; color: var(--ink); outline: none;
    box-shadow: 0 8px 32px rgba(31,38,135,0.08);
    transition: box-shadow .2s;
  }
  .search-input::placeholder { color: color-mix(in srgb, var(--muted) 80%, transparent); }
  .search-input:focus { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 35%, transparent); }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: none;
  }
  .search-clear.show { display: block; }

  .filters { margin-top: 16px; }
  .filter-label {
    font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em;
    color: var(--muted); display: flex; justify-content: space-between; align-items: center;
    padding: 0 2px;

  .reset-btn { background: none; border: none; color: var(--accent); font-size: 12px; font-weight: 500; cursor: pointer; padding: 0; }
  .chip-row {
    display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px 4px; margin: 0 -20px;
    scrollbar-width: none;
  }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    white-space: nowrap; border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); background: var(--chip-bg); color: var(--ink);
    cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  .chip.active {
    background: var(--ink); color: var(--bg); border-color: transparent;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06); transform: scale(1.02);
  }

  .count-row { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); margin: 20px 2px 10px; }

  .grid { display: flex; flex-direction: column; gap: 10px; }

  .card {
    display: flex; align-items: center; gap: 14px;
    border: 1px solid var(--border); background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 20px; padding: 14px;
    box-shadow: 0 8px 32px rgba(31,38,135,0.08);
    cursor: pointer; text-align: left; width: 100%;
    animation: fadeUp .4s ease-out both;
    transition: transform .15s;
  }
  .card:active { transform: scale(0.97); box-shadow: none; }
  .card-glyph { width: 46px; height: 72px; flex-shrink: 0; }
  .card-body { min-width: 0; flex: 1; }
  .card-title-row { display: flex; align-items: baseline; gap: 6px; }
  .card-title-row h3 { font-size: 15px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-storage { font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .card-sub { margin: 3px 0 0; font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-price { margin-top: 6px; font-size: 16px; font-weight: 600; }
  .card-arrow { flex-shrink: 0; color: color-mix(in srgb, var(--muted) 50%, transparent); }

  .badge {
    display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 10px;
    font-size: 11px; font-weight: 600; letter-spacing: -0.01em; margin-top: 6px;

  .badge-warn { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); }
  .badge-muted { background: color-mix(in srgb, var(--muted) 12%, transparent); color: var(--muted); }
  .badge-danger { background: color-mix(in srgb, var(--danger) 12%, transparent); color: var(--danger); }

  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    border: 1.5px dashed var(--border); border-radius: 24px; padding: 64px 20px; text-align: center;

  .empty svg { width: 32px; height: 32px; color: var(--muted); }
  .empty p { font-size: 14px; color: var(--muted); max-width: 220px; margin: 0; }

  .detail-page { padding: 24px 20px 140px; animation: fadeIn .3s ease-out; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px; background: none; border: none;

  .hero {

    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);

  .hero svg { height: 256px; width: 160px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15)); }

  .detail-body { margin-top: 24px; animation: fadeUp .4s ease-out .1s both; }

  .detail-sub { margin: 4px 0 0; font-size: 15px; color: var(--muted); }

  .detail-card {
    margin-top: 16px; border: 1px solid var(--border); background: var(--surface);

  .detail-row .value { font-size: 14px; font-weight: 500; }

  .price-banner .label { font-size: 14px; opacity: .7; }
  .price-banner .value { font-size: 22px; font-weight: 600; }

  .action-bar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    border-top: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 85%, transparent);

  .btn-back {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px;

  .btn-order {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--accent); color: #fff; border: none; border-radius: 16px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    transition: transform .15s;
  }
  .btn-order:active { transform: scale(0.98); }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }

</style>

}
function haptic(kind) {
  if (!tg || !tg.HapticFeedback) return;
  if (kind === 'success') tg.HapticFeedback.notificationOccurred('success');
  else tg.HapticFeedback.impactOccurred(kind === 'select' ? 'medium' : 'light');
}
function openOrderChat() {
  haptic('success');
  const url = 'https://t.me/' + ORDER_USERNAME;
  if (tg) tg.openTelegramLink(url);
  else window.open(url, '_blank', 'noopener,noreferrer');
}

// ====================== СОСТОЯНИЕ ======================
const state = {
  query: '',
  models: [],
  countries: [],
  route: { page: 'home', productId: null },
};

function formatPrice(price) {
  return new Intl.NumberFormat('ru-RU').format(price) + ' ₽';
}
function pluralize(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return 'товар';
  if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'товара';
  return 'товаров';
}
function matchesQuery(p, q) {
  if (!q.trim()) return true;
  const hay = [p.model, p.storage, p.color, String(p.price)].join(' ').toLowerCase();
  return hay.includes(q.toLowerCase().trim());
}
function filterProducts() {
  return CATALOG.products.filter(p => {
    if (!matchesQuery(p, state.query)) return false;
    if (state.models.length && !state.models.includes(p.model)) return false;
    if (state.countries.length && !state.countries.includes(p.country)) return false;
    return true;
  });
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ====================== ИЛЛЮСТРАЦИЯ УСТРОЙСТВА (SVG) ======================
// Оригинальная графика вместо официальных фото Apple (авторские права).
function deviceGlyph(colorHex, isPro, extraClass) {
  const gid = 'g' + colorHex.replace('#', '');
  const cam = isPro
    ? `<rect x="42" y="34" width="76" height="76" rx="22" fill="rgba(0,0,0,0.35)"/>
       <circle cx="62" cy="54" r="14" fill="#111"/><circle cx="62" cy="54" r="8" fill="#2b2b2e"/>
       <circle cx="98" cy="54" r="14" fill="#111"/><circle cx="98" cy="54" r="8" fill="#2b2b2e"/>
       <circle cx="62" cy="90" r="14" fill="#111"/><circle cx="62" cy="90" r="8" fill="#2b2b2e"/>`
    : `<rect x="44" y="36" width="52" height="52" rx="18" fill="rgba(0,0,0,0.3)"/>
       <circle cx="58" cy="50" r="12" fill="#111"/><circle cx="58" cy="50" r="6.5" fill="#2b2b2e"/>
       <circle cx="82" cy="74" r="12" fill="#111"/><circle cx="82" cy="74" r="6.5" fill="#2b2b2e"/>`;
  return `
  <svg viewBox="0 0 240 480" class="${extraClass || ''}" role="img" aria-label="Иллюстрация устройства">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${colorHex}" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="${colorHex}" stop-opacity="0.75"/>
      </linearGradient>
      <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.35"/>
        <stop offset="40%" stop-color="#fff" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <rect x="20" y="10" width="200" height="460" rx="46" fill="url(#${gid})" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
    <rect x="32" y="24" width="176" height="432" rx="36" fill="#0b0b0c"/>
    <rect x="32" y="24" width="176" height="432" rx="36" fill="url(#shine)"/>
    <rect x="94" y="44" width="52" height="18" rx="9" fill="#000" opacity="0.9"/>
    ${cam}
    <rect x="16" y="140" width="4" height="50" rx="2" fill="rgba(0,0,0,0.25)"/>
    <rect x="220" y="120" width="4" height="70" rx="2" fill="rgba(0,0,0,0.25)"/>
  </svg>`;
}

// ====================== РЕНДЕР: ГЛАВНАЯ ======================
function renderHome() {
  const filtered = filterProducts();
  const date = new Date(CATALOG.updatedAt).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });

  const modelChips = MODEL_FILTERS.map(m =>
    `<button class="chip ${state.models.includes(m) ? 'active' : ''}" data-toggle-model="${escapeHtml(m)}">${escapeHtml(m)}</button>`
  ).join('');

  const countryChips = Object.keys(COUNTRY_META).map(code =>
    `<button class="chip ${state.countries.includes(code) ? 'active' : ''}" data-toggle-country="${code}">${COUNTRY_META[code].flag} ${COUNTRY_META[code].label}</button>`
  ).join('');

  const hasActiveFilters = state.models.length || state.countries.length;

  const cards = filtered.length === 0
    ? `<div class="empty">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
         <p>Ничего не найдено. Попробуйте изменить запрос или сбросить фильтры.</p>
       </div>`
    : `<div class="grid">${filtered.map((p, i) => cardHtml(p, i)).join('')}</div>`;

  return `
    <div class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>
        </div>
        <h1>RmStore</h1>
      </div>
      <p class="subtitle">Актуальные цены на Apple</p>
      <p class="updated">Обновлено ${date}</p>
    </div>
    <div class="content">
      <div class="search-wrap">
        <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" id="search-input" type="text" inputmode="search" placeholder="Модель, память, цвет или цена" value="${escapeHtml(state.query)}" />
        <button class="search-clear ${state.query ? 'show' : ''}" id="search-clear" aria-label="Очистить поиск">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="filters">
        <div class="filter-label"><span>Модель</span>${hasActiveFilters ? '<button class="reset-btn" id="reset-filters">Сбросить</button>' : ''}</div>
        <div class="chip-row">${modelChips}</div>
        <div class="filter-label" style="margin-top:4px;"><span>Страна поставки</span></div>
        <div class="chip-row">${countryChips}</div>
      </div>

      <div class="count-row">${filtered.length} ${pluralize(filtered.length)}</div>
      ${cards}
    </div>
  `;
}

function cardHtml(p, i) {
  const country = COUNTRY_META[p.country];
  const isPro = p.model.includes('Pro');
  const badge = p.status ? `<span class="badge ${STATUS_META[p.status].cls}">${STATUS_META[p.status].label}</span>` : '';
  return `
    <button class="card" data-product-id="${p.id}" style="animation-delay:${Math.min(i * 0.03, 0.3)}s">
      <div class="card-glyph">${deviceGlyph(p.colorHex, isPro, 'card-glyph')}</div>
      <div class="card-body">
        <div class="card-title-row"><h3>${escapeHtml(p.model)}</h3><span class="card-storage">${escapeHtml(p.storage)}</span></div>
        <p class="card-sub">${escapeHtml(p.color)} · ${country.flag} ${country.label}</p>
        <div class="card-price">${formatPrice(p.price)}</div>
        ${badge}
      </div>
      <div class="card-arrow"><svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M1 1L7 7L1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </button>
  `;
}

// ====================== РЕНДЕР: КАРТОЧКА ТОВАРА ======================
function renderDetail(productId) {
  const p = CATALOG.products.find(x => x.id === productId);
  if (!p) {
    return `<div class="detail-page"><p style="text-align:center;color:var(--muted)">Товар не найден.</p></div>`;
  }
  const country = COUNTRY_META[p.country];
  const isPro = p.model.includes('Pro');
  const statusRow = p.status
    ? `<div class="detail-row"><span class="label">Статус</span><span class="badge ${STATUS_META[p.status].cls}">${STATUS_META[p.status].label}</span></div>`
    : `<div class="detail-row"><span class="label">Статус</span><span class="value">Новый, запечатан</span></div>`;

  return `
    <div class="detail-page">
      <button class="back-link" id="back-btn-top">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Назад
      </button>

      <div class="hero">${deviceGlyph(p.colorHex, isPro, '')}</div>

      <div class="detail-body">
        <div class="detail-title-row">
          <h1>${escapeHtml(p.model)}</h1>
          ${p.status ? `<span class="badge ${STATUS_META[p.status].cls}">${STATUS_META[p.status].label}</span>` : ''}
        </div>
        <p class="detail-sub">${escapeHtml(p.storage)} · ${escapeHtml(p.color)}</p>

        <div class="detail-card">
          <div class="detail-row"><span class="label">Модель</span><span class="value">${escapeHtml(p.model)}</span></div>
          <div class="detail-row"><span class="label">Память</span><span class="value">${escapeHtml(p.storage)}</span></div>
          <div class="detail-row"><span class="label">Цвет</span><span class="value">${escapeHtml(p.color)}</span></div>
          <div class="detail-row"><span class="label">Страна поставки</span><span class="value">${country.flag} ${country.label}</span></div>
          ${statusRow}
        </div>

        <div class="price-banner">
          <span class="label">Цена</span>
          <span class="value">${formatPrice(p.price)}</span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-back" id="back-btn-bottom">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Назад
      </button>
      <button class="btn-order" id="order-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Заказать
      </button>
    </div>
  `;
}

// ====================== РОУТИНГ И РЕНДЕР ======================
function render() {
  const app = document.getElementById('app');
  if (state.route.page === 'detail') {
    app.innerHTML = renderDetail(state.route.productId);
    if (tg) tg.BackButton.show();
  } else {
    app.innerHTML = renderHome();
    if (tg) tg.BackButton.hide();
  }
  attachEvents();
}

function goHome() {
  haptic('tap');
  state.route = { page: 'home', productId: null };
  location.hash = '';
  render();
}
function goDetail(id) {
  haptic('select');
  state.route = { page: 'detail', productId: id };
  location.hash = 'product/' + id;
  render();
}

function attachEvents() {
  if (state.route.page === 'home') {
    const input = document.getElementById('search-input');
    input.addEventListener('input', (e) => {
      state.query = e.target.value;
      render();
      // сохраняем фокус и позицию курсора после ре-рендера
      const el = document.getElementById('search-input');
      el.focus();
      el.setSelectionRange(el.value.length, el.value.length);
    });
    const clearBtn = document.getElementById('search-clear');
    if (clearBtn) clearBtn.addEventListener('click', () => { state.query = ''; render(); });

    document.querySelectorAll('[data-toggle-model]').forEach(btn => {
      btn.addEventListener('click', () => {
        haptic('tap');
        const m = btn.getAttribute('data-toggle-model');
        state.models = state.models.includes(m) ? state.models.filter(x => x !== m) : [...state.models, m];
        render();
      });
    });
    document.querySelectorAll('[data-toggle-country]').forEach(btn => {
      btn.addEventListener('click', () => {
        haptic('tap');
        const c = btn.getAttribute('data-toggle-country');
        state.countries = state.countries.includes(c) ? state.countries.filter(x => x !== c) : [...state.countries, c];
        render();
      });
    });
    const resetBtn = document.getElementById('reset-filters');
    if (resetBtn) resetBtn.addEventListener('click', () => { state.models = []; state.countries = []; render(); });

    document.querySelectorAll('[data-product-id]').forEach(card => {
      card.addEventListener('click', () => goDetail(card.getAttribute('data-product-id')));
    });
  } else {
    const backTop = document.getElementById('back-btn-top');
    const backBottom = document.getElementById('back-btn-bottom');
    if (backTop) backTop.addEventListener('click', goHome);
    if (backBottom) backBottom.addEventListener('click', goHome);
    const orderBtn = document.getElementById('order-btn');
    if (orderBtn) orderBtn.addEventListener('click', openOrderChat);
  }
}

if (tg) {
  tg.BackButton.onClick(goHome);
}

// восстановление маршрута из хэша (на случай обновления страницы на карточке товара)
function routeFromHash() {
  const hash = location.hash.replace('#', '');
  if (hash.startsWith('product/')) {
    state.route = { page: 'detail', productId: hash.replace('product/', '') };
  } else {
    state.route = { page: 'home', productId: null };
  }
}
window.addEventListener('hashchange', () => { routeFromHash(); render(); });

routeFromHash();
render();
</script>
